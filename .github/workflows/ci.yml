name: CI

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: macos-26
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Tuist
        run: brew install tuist

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme Clusage \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO
