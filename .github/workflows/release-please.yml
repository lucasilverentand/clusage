name: Release

on:
  push:
    branches: [main]

# Minimal default permissions — jobs override as needed
permissions: {}

jobs:
  test:
    runs-on: macos-26
    permissions: {}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Tuist
        run: |
          curl -Ls https://install.tuist.io | bash
          tuist version

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme Clusage \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567f4485f42 # v4.2.0
        id: release

  build:
    needs: [test, release-please]
    if: needs.release-please.outputs.release_created
    runs-on: macos-26
    environment: release
    permissions:
      contents: write
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Tuist
        run: |
          curl -Ls https://install.tuist.io | bash
          tuist version

      - name: Generate Xcode project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: tuist generate --no-open

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          rm certificate.p12

      - name: Build release archive
        run: |
          xcodebuild archive \
            -scheme Clusage \
            -configuration Release \
            -archivePath build/Clusage.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export app
        run: |
          mkdir -p build/export
          cp -R build/Clusage.xcarchive/Products/Applications/Clusage.app build/export/

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent build/export/Clusage.app build/Clusage-notarize.zip

          xcrun notarytool submit build/Clusage-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple build/export/Clusage.app

          rm build/Clusage-notarize.zip

      - name: Create DMG
        run: |
          hdiutil create -volname "Clusage" \
            -srcfolder build/export \
            -ov -format UDZO \
            build/Clusage.dmg

      - name: Create zip
        run: |
          cd build/export
          zip -r -y ../Clusage.zip Clusage.app

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            build/Clusage.dmg \
            build/Clusage.zip \
            --clobber

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
