name: Release

on:
  push:
    branches: [main]

# Minimal default permissions — jobs override as needed
permissions: {}

jobs:
  test:
    runs-on: macos-26
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Tuist
        run: brew install tuist

      - name: Generate Xcode project
        run: tuist generate --no-open

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme Clusage \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release

  build:
    needs: [test, release-please]
    if: needs.release-please.outputs.release_created
    runs-on: macos-26
    environment: release
    permissions:
      contents: write
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Tuist
        run: brew install tuist

      - name: Generate Xcode project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: tuist generate --no-open

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          rm certificate.p12

      - name: Build release archive
        run: |
          xcodebuild archive \
            -scheme Clusage \
            -configuration Release \
            -archivePath build/Clusage.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export and sign app
        run: |
          mkdir -p build/export
          cp -R build/Clusage.xcarchive/Products/Applications/Clusage.app build/export/

          # Sign the widgets extension first, then the main app (inside-out)
          codesign --force --deep --options runtime \
            --sign "Developer ID Application" \
            --entitlements ClusageWidgets.entitlements \
            build/export/Clusage.app/Contents/Extensions/ClusageWidgets.appex

          codesign --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements Clusage.entitlements \
            build/export/Clusage.app

          codesign --verify --deep --strict build/export/Clusage.app

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent build/export/Clusage.app build/Clusage-notarize.zip

          xcrun notarytool submit build/Clusage-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple build/export/Clusage.app

          rm build/Clusage-notarize.zip

      - name: Create DMG
        run: |
          # Create a temporary directory for the DMG contents
          mkdir -p build/dmg
          cp -R build/export/Clusage.app build/dmg/

          # Create a symlink to /Applications
          ln -s /Applications build/dmg/Applications

          # Create a read-write DMG first
          hdiutil create -volname "Clusage" \
            -srcfolder build/dmg \
            -ov -format UDRW \
            -fs HFS+ \
            build/Clusage-rw.dmg

          # Mount the DMG to set window properties
          MOUNT_DIR=$(hdiutil attach -readwrite -noverify build/Clusage-rw.dmg | grep '/Volumes/' | awk '{print $3}')

          # Set Finder window properties via AppleScript
          osascript <<'APPLESCRIPT'
            tell application "Finder"
              tell disk "Clusage"
                open
                set current view of container window to icon view
                set toolbar visible of container window to false
                set statusbar visible of container window to false
                set bounds of container window to {100, 100, 640, 400}
                set theViewOptions to icon view options of container window
                set arrangement of theViewOptions to not arranged
                set icon size of theViewOptions to 80
                set position of item "Clusage.app" of container window to {140, 150}
                set position of item "Applications" of container window to {400, 150}
                close
              end tell
            end tell
          APPLESCRIPT

          # Set the DMG icon layout
          sync

          # Unmount
          hdiutil detach "$MOUNT_DIR"

          # Convert to compressed read-only DMG
          hdiutil convert build/Clusage-rw.dmg \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o build/Clusage.dmg

          rm build/Clusage-rw.dmg

      - name: Create zip
        run: |
          cd build/export
          zip -r -y ../Clusage.zip Clusage.app

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            build/Clusage.dmg \
            build/Clusage.zip \
            --clobber

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
